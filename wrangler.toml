name = "image-compressor"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# OpenNext for Cloudflare automatically configures this via open-next.config.ts
# The main entry point is .open-next/worker.js
main = ".open-next/worker.js"
assets = { directory = ".open-next/assets", binding = "ASSETS" }

# D1 Database binding
# Replace DATABASE_ID below after running: npx wrangler d1 create image-compressor-db
[[d1_databases]]
binding = "DB"
database_name = "image-compressor-db"
database_id = "aaf9b55b-a0ee-4205-982e-daeb11211efe"

# Environment variables
# All sensitive credentials must be set in Cloudflare Dashboard:
#   Workers & Pages → image-compressor → Settings → Environment variables
#
# Required environment variables (set in Dashboard):
#   - GOOGLE_CLIENT_ID
#   - GOOGLE_CLIENT_SECRET
#   - JWT_SECRET
#   - PAYPAL_CLIENT_ID
#   - PAYPAL_CLIENT_SECRET
#
# Note: Do NOT put sensitive values in this file - it will be committed to git!
