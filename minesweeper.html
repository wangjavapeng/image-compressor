<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扫雷 - 太三出品 😂</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: 'Segoe UI', sans-serif;
  color: #e0e0e0;
  padding: 20px;
}
h1 {
  font-size: 2em;
  margin: 15px 0 5px;
  text-shadow: 0 0 10px rgba(100, 200, 255, 0.5);
}
.subtitle { color: #888; margin-bottom: 20px; font-size: 0.9em; }
.controls {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
  flex-wrap: wrap;
  justify-content: center;
}
.controls button {
  padding: 8px 18px;
  border: none;
  border-radius: 8px;
  font-size: 0.95em;
  cursor: pointer;
  background: #e94560;
  color: white;
  transition: all 0.2s;
  font-weight: 600;
}
.controls button:hover { background: #c73e54; transform: scale(1.05); }
.controls select {
  padding: 8px 12px;
  border: 2px solid #533483;
  border-radius: 8px;
  background: #1a1a2e;
  color: #e0e0e0;
  font-size: 0.95em;
}
.info-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  max-width: 560px;
  margin-bottom: 10px;
  padding: 8px 15px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
}
.info-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 1.2em;
  font-weight: bold;
}
.emoji-btn {
  font-size: 2em;
  cursor: pointer;
  user-select: none;
  transition: transform 0.1s;
}
.emoji-btn:hover { transform: scale(1.2); }
.emoji-btn:active { transform: scale(0.9); }
.board {
  display: inline-grid;
  gap: 2px;
  background: #2a2a4a;
  padding: 6px;
  border-radius: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.cell {
  width: 36px;
  height: 36px;
  border: none;
  border-radius: 4px;
  font-size: 1em;
  font-weight: 800;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.1s;
  user-select: none;
  -webkit-user-select: none;
}
.cell.hidden {
  background: linear-gradient(145deg, #4a4a6a, #3a3a5a);
  box-shadow: inset 1px 1px 2px rgba(255,255,255,0.1), inset -1px -1px 2px rgba(0,0,0,0.2);
}
.cell.hidden:hover {
  background: linear-gradient(145deg, #5a5a7a, #4a4a6a);
  transform: scale(1.05);
}
.cell.revealed {
  background: rgba(255,255,255,0.08);
  cursor: default;
}
.cell.flagged {
  background: linear-gradient(145deg, #4a4a6a, #3a3a5a);
}
.cell.mine-exploded {
  background: #e94560 !important;
  animation: explode 0.3s ease-out;
}
.cell.mine-shown {
  background: rgba(255,255,255,0.08);
}
@keyframes explode {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}
.n1 { color: #4fc3f7; } .n2 { color: #66bb6a; } .n3 { color: #ef5350; }
.n4 { color: #ab47bc; } .n5 { color: #ff7043; } .n6 { color: #26c6da; }
.n7 { color: #ec407a; } .n8 { color: #bdbdbd; }
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  padding: 15px 30px;
  border-radius: 12px;
  font-size: 1.3em;
  font-weight: bold;
  z-index: 100;
  transition: transform 0.4s ease;
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.win { background: linear-gradient(135deg, #00c853, #00e676); color: white; }
.toast.lose { background: linear-gradient(135deg, #e94560, #ff6b6b); color: white; }
.stats {
  margin-top: 15px;
  color: #888;
  font-size: 0.85em;
}
</style>
</head>
<body>
<h1>💣 扫雷</h1>
<p class="subtitle">太三出品 😂</p>
<div class="controls">
  <select id="difficulty">
    <option value="easy">简单 (9×9, 10雷)</option>
    <option value="medium">中等 (16×16, 40雷)</option>
    <option value="hard">困难 (16×30, 99雷)</option>
  </select>
  <button onclick="newGame()">新游戏</button>
</div>
<div class="info-bar">
  <div class="info-item">💣 <span id="mine-count">10</span></div>
  <div class="emoji-btn" id="face" onclick="newGame()">😊</div>
  <div class="info-item">⏱️ <span id="timer">0</span></div>
</div>
<div id="board" class="board"></div>
<p class="stats">左键点击揭开 | 右键/长按插旗 | 点击表情重新开始</p>

<div id="toast" class="toast"></div>

<script>
const DIFFICULTIES = {
  easy:   { rows: 9,  cols: 9,  mines: 10 },
  medium: { rows: 16, cols: 16, mines: 40 },
  hard:   { rows: 16, cols: 30, mines: 99 }
};

let grid, revealed, flagged, rows, cols, totalMines;
let gameOver, firstClick, timerInterval, seconds;
let flagCount = 0;

function newGame() {
  const diff = document.getElementById('difficulty').value;
  const d = DIFFICULTIES[diff];
  rows = d.rows; cols = d.cols; totalMines = d.mines;
  gameOver = false; firstClick = true;
  flagCount = 0; seconds = 0;
  clearInterval(timerInterval);
  document.getElementById('timer').textContent = '0';
  document.getElementById('mine-count').textContent = totalMines;
  document.getElementById('face').textContent = '😊';
  document.getElementById('toast').className = 'toast';
  
  grid = Array.from({length: rows}, () => Array(cols).fill(0));
  revealed = Array.from({length: rows}, () => Array(cols).fill(false));
  flagged = Array.from({length: rows}, () => Array(cols).fill(false));
  
  renderBoard();
}

function placeMines(safeR, safeC) {
  let placed = 0;
  while (placed < totalMines) {
    const r = Math.floor(Math.random() * rows);
    const c = Math.floor(Math.random() * cols);
    if (grid[r][c] === -1) continue;
    if (Math.abs(r - safeR) <= 1 && Math.abs(c - safeC) <= 1) continue;
    grid[r][c] = -1;
    placed++;
  }
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (grid[r][c] !== -1)
        grid[r][c] = countAdjacent(r, c);
}

function countAdjacent(r, c) {
  let count = 0;
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++) {
      if (!dr && !dc) continue;
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && grid[nr][nc] === -1) count++;
    }
  return count;
}

function reveal(r, c) {
  if (r < 0 || r >= rows || c < 0 || c >= cols) return;
  if (revealed[r][c] || flagged[r][c]) return;
  revealed[r][c] = true;
  if (grid[r][c] === 0) {
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++)
        reveal(r + dr, c + dc);
  }
}

function toggleFlag(r, c) {
  if (revealed[r][c] || gameOver) return;
  flagged[r][c] = !flagged[r][c];
  flagCount += flagged[r][c] ? 1 : -1;
  document.getElementById('mine-count').textContent = totalMines - flagCount;
  renderBoard();
}

function handleClick(r, c) {
  if (gameOver || flagged[r][c] || revealed[r][c]) return;
  if (firstClick) {
    firstClick = false;
    placeMines(r, c);
    startTimer();
  }
  if (grid[r][c] === -1) {
    gameOver = true;
    clearInterval(timerInterval);
    revealed[r][c] = true;
    revealAllMines(r, c);
    document.getElementById('face').textContent = '😵';
    renderBoard();
    showToast('💀 踩雷了！再试一次？', 'lose');
    return;
  }
  reveal(r, c);
  renderBoard();
  checkWin();
}

function chordReveal(r, c) {
  if (!revealed[r][c] || grid[r][c] <= 0) return;
  let adjFlags = 0;
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++) {
      if (!dr && !dc) continue;
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && flagged[nr][nc]) adjFlags++;
    }
  if (adjFlags === grid[r][c]) {
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++) {
        if (!dr && !dc) continue;
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && !flagged[nr][nc])
          handleClick(nr, nc);
      }
  }
}

function revealAllMines(explodedR, explodedC) {
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (grid[r][c] === -1) revealed[r][c] = true;
}

function checkWin() {
  let unrevealed = 0;
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (!revealed[r][c]) unrevealed++;
  if (unrevealed === totalMines) {
    gameOver = true;
    clearInterval(timerInterval);
    document.getElementById('face').textContent = '😎';
    // Auto-flag remaining mines
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        if (!revealed[r][c]) flagged[r][c] = true;
    renderBoard();
    showToast('🎉 恭喜通关！用时 ' + seconds + ' 秒', 'win');
  }
}

function startTimer() {
  seconds = 0;
  timerInterval = setInterval(() => {
    seconds++;
    document.getElementById('timer').textContent = seconds;
  }, 1000);
}

function renderBoard() {
  const board = document.getElementById('board');
  board.style.gridTemplateColumns = `repeat(${cols}, 36px)`;
  board.innerHTML = '';
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const btn = document.createElement('div');
      btn.className = 'cell';
      
      if (revealed[r][c]) {
        if (grid[r][c] === -1) {
          btn.classList.add('mine-exploded');
          btn.textContent = '💥';
        } else {
          btn.classList.add('revealed');
          if (grid[r][c] > 0) {
            btn.textContent = grid[r][c];
            btn.classList.add('n' + grid[r][c]);
          }
        }
      } else if (flagged[r][c]) {
        btn.classList.add('flagged');
        btn.textContent = '🚩';
      } else {
        btn.classList.add('hidden');
      }
      
      const row = r, col = c;
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        if (revealed[row][col]) chordReveal(row, col);
        else handleClick(row, col);
      });
      btn.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        toggleFlag(row, col);
      });
      
      // Long press for mobile
      let pressTimer;
      btn.addEventListener('touchstart', (e) => {
        pressTimer = setTimeout(() => {
          e.preventDefault();
          toggleFlag(row, col);
        }, 400);
      });
      btn.addEventListener('touchend', () => clearTimeout(pressTimer));
      btn.addEventListener('touchmove', () => clearTimeout(pressTimer));
      
      board.appendChild(btn);
    }
  }
}

function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast ' + type + ' show';
  setTimeout(() => toast.className = 'toast', 3000);
}

// Difficulty change triggers new game
document.getElementById('difficulty').addEventListener('change', newGame);

// Init
newGame();
</script>
</body>
</html>
